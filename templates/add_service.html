<!DOCTYPE html>
<html>
<head>
    <title>Neuen Service hinzufügen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Neuen Service anlegen</h2>
        <form method="post">
            <label>ID (z.B. HW-009-011):</label><br>
            <input type="text" name="id" required><br>
            <label>Name:</label><br>
            <input type="text" name="name" required><br>
            <label>Kategorie (Hardware, Software, Zugang, Support):</label><br>
            <input type="text" name="category" required><br>
            <label>Verfügbarkeit:</label><br>
            <input type="text" name="availability" required><br>
            <label>Business-Beschreibung:</label><br>
            <textarea name="description_business" rows="3" cols="50"></textarea><br>
            <label>Technische Beschreibung:</label><br>
            <textarea name="description_technical" rows="3" cols="50"></textarea><br>
            <label>SLA:</label><br>
            <input type="text" name="sla"><br>
            <label>Kosten (optional):</label><br>
            <input type="text" name="costs"><br>
            <button type="submit">Speichern</button>
        </form>
        <a href="{{ url_for('index') }}">Zurück</a>
    </div>
</body>
</html>
