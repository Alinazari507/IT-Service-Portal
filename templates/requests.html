<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Meine Anfragen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>📋 Meine IT-Anfragen</h2>
        <table>
            <thead>
                <tr>
                    <th>Service-ID</th>
                    <th>Grund (Reason)</th>
                    <th>Status</th>
                    <th>Erstellt am</th>
                </tr>
            </thead>
            <tbody>
                {% for req in requests %}
                <tr>
                    <td><strong>{{ req.service_id }}</strong></td>
                    <td>{{ req.reason }}</td>
                    <td>
                        <span class="status-{{ req.status.lower() }}">
                            {{ req.status }}
                        </span>
                    </td>
                    <td>{{ req.created_at }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4">Keine Anfragen vorhanden.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <div class="admin-link" style="margin-top: 20px;">
            <a href="{{ url_for('index') }}" class="btn-secondary" style="text-decoration: none; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                ← Zurück zum Katalog
            </a>
        </div>
    </div>
</body>
</html>
